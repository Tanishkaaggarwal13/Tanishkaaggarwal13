<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none"
xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Main Background Gradient -->
<linearGradient id="bgGradient" x1="0" y1="0" x2="1180" y2="610">
    <stop offset="0%" stop-color="#030712"/>
    <stop offset="100%" stop-color="#020617"/>
    <animate attributeName="x1"
        values="0;200;0"
        dur="12s"
        repeatCount="indefinite"/>
</linearGradient>


<!-- Accent Moving Gradient -->
<linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>

    <animate attributeName="x1"
        values="0;1;0"
        dur="8s"
        repeatCount="indefinite"/>

    <animate attributeName="x2"
        values="1;0;1"
        dur="8s"
        repeatCount="indefinite"/>
</linearGradient>


<!-- ASCII Glow Gradient -->
<linearGradient id="asciiGradient" x1="0" y1="0" x2="1" y2="1">

    <stop offset="0%" stop-color="#22D3EE"/>
    <stop offset="50%" stop-color="#8B5CF6"/>
    <stop offset="100%" stop-color="#06B6D4"/>

    <animate attributeName="x1"
        values="0;1;0"
        dur="6s"
        repeatCount="indefinite"/>

</linearGradient>


<!-- Terminal Border Gradient -->
<linearGradient id="borderGradient">

    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.1"/>

    <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.8"/>

    <stop offset="100%" stop-color="#10B981" stop-opacity="0.1"/>

    <animate attributeName="x1"
        values="0;1;0"
        dur="5s"
        repeatCount="indefinite"/>

</linearGradient>


<!-- Radial Background Glow -->

<radialGradient id="blueGlow">

    <stop offset="0%" stop-color="#2563EB"
    stop-opacity="0.35"/>

    <stop offset="100%"
    stop-color="#2563EB"
    stop-opacity="0"/>

</radialGradient>


<radialGradient id="purpleGlow">

    <stop offset="0%"
    stop-color="#7C3AED"
    stop-opacity="0.28"/>

    <stop offset="100%"
    stop-color="#7C3AED"
    stop-opacity="0"/>

</radialGradient>


<radialGradient id="greenGlow">

    <stop offset="0%"
    stop-color="#10B981"
    stop-opacity="0.18"/>

    <stop offset="100%"
    stop-color="#10B981"
    stop-opacity="0"/>

</radialGradient>


<!-- Glass Blur -->

<filter id="glassBlur">

<feGaussianBlur
stdDeviation="20"/>

</filter>


<!-- Glow Filter -->

<filter id="glow">

<feGaussianBlur
stdDeviation="6"
result="blur"/>

<feMerge>

<feMergeNode in="blur"/>

<feMergeNode in="SourceGraphic"/>

</feMerge>

</filter>


<!-- Soft Shadow -->

<filter id="shadow">

<feGaussianBlur
stdDeviation="15"/>

</filter>


<!-- Noise Texture -->

<filter id="noise">

<feTurbulence
type="fractalNoise"
baseFrequency="0.8"
numOctaves="2"
result="noise"/>

<feBlend
in="SourceGraphic"
in2="noise"
mode="soft-light"/>

</filter>


<!-- Rounded Clip -->

<clipPath id="mainClip">

<rect
x="0"
y="0"
width="1180"
height="610"
rx="32"/>

</clipPath>


</defs>


<!-- Main Canvas -->

<g clip-path="url(#mainClip)">


<!-- Background -->

<rect
width="1180"
height="610"
fill="url(#bgGradient)"
/>


<!-- Animated Ambient Glows -->

<circle
cx="160"
cy="100"
r="260"
fill="url(#blueGlow)"
filter="url(#glassBlur)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;40 20;0 0"
dur="14s"
repeatCount="indefinite"/>

</circle>


<circle
cx="900"
cy="520"
r="280"
fill="url(#purpleGlow)"
filter="url(#glassBlur)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;-40 -20;0 0"
dur="16s"
repeatCount="indefinite"/>

</circle>


<circle
cx="600"
cy="250"
r="180"
fill="url(#greenGlow)"
filter="url(#glassBlur)">

<animateTransform
attributeName="transform"
type="translate"
values="0 0;20 -30;0 0"
dur="12s"
repeatCount="indefinite"/>

</circle>


<!-- Noise Overlay -->

<rect
width="1180"
height="610"
opacity="0.08"
filter="url(#noise)"
/>
<!-- Glass Main Panels -->

<rect
x="32"
y="32"
width="1116"
height="546"
rx="28"
fill="#0F172A"
fill-opacity="0.45"
stroke="rgba(255,255,255,0.08)"
stroke-width="1"
filter="url(#glassBlur)"
/>


<!-- Left Glass Section -->

<rect
x="55"
y="70"
width="390"
height="470"
rx="24"
fill="#0F172A"
fill-opacity="0.65"
stroke="url(#borderGradient)"
stroke-width="1.5">

<animate attributeName="stroke-opacity"
values="0.4;1;0.4"
dur="4s"
repeatCount="indefinite"/>

</rect>


<!-- Right Terminal Section -->

<rect
x="470"
y="70"
width="655"
height="470"
rx="24"
fill="#0F172A"
fill-opacity="0.72"
stroke="url(#borderGradient)"
stroke-width="1.5">

<animate attributeName="stroke-opacity"
values="0.5;1;0.5"
dur="5s"
repeatCount="indefinite"/>

</rect>


<!-- Glass Reflection -->

<path
d="M70 90 H1080 Q1110 90 1110 120 V160 H70Z"
fill="white"
opacity="0.035">

<animate attributeName="opacity"
values="0.02;0.08;0.02"
dur="6s"
repeatCount="indefinite"/>

</path>


<!-- Moving Border Shimmer -->

<rect
x="32"
y="32"
