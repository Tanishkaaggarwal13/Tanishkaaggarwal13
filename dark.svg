height="546"
rx="28"
fill="none"
stroke="url(#accentGradient)"
stroke-width="2"
stroke-dasharray="120 800">

<animate attributeName="stroke-dashoffset"
values="0;920"
dur="8s"
repeatCount="indefinite"/>

</rect>


<!-- Scanline Layer -->

<g opacity="0.12">

