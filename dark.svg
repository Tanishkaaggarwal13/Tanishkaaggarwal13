repeatCount="indefinite"/>
</circle>

</g>


<!-- Small Particle Group -->

<g fill="#8B5CF6">

<circle cx="300" cy="80" r="1">
<animateMotion
path="M0 0 Q40 50 0 100"
dur="10s"
repeatCount="indefinite"/>
</circle>


<circle cx="950" cy="160" r="1.5">
<animateMotion
path="M0 0 Q-50 60 0 120"
