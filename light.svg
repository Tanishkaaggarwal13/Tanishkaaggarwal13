<!-- Availability -->
<text x="820" y="575" fill="#059669" font-size="12" font-family="monospace">
● Available for learning &amp; collaboration
<animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
</text>

<!-- Final Border -->
<rect x="32" y="32" width="1116" height="546" rx="28" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.5">
<animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
</rect>

</g>
</g>

</svg>
