</text>

<!-- Greeting -->
<text x="520" y="215" fill="#0F172A" font-size="30" font-weight="700">
Hi 👋
</text>

<text x="520" y="255" fill="#0F172A" font-size="28" font-weight="700">
I'm Tanishka Aggarwal
</text>

<!-- Animated Titles -->
<text x="520" y="300" fill="url(#accentGradient)" font-size="17" font-weight="600">
AI &amp; Machine Learning Explorer
<animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="8s" repeatCount="indefinite"/>
</text>

