<svg width="1180" height="610" viewBox="0 0 1180 610"
fill="none"
xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Light Background -->
<linearGradient id="bgGradient" x1="0" y1="0" x2="1180" y2="610">
<stop offset="0%" stop-color="#FFFFFF"/>
<stop offset="100%" stop-color="#F8FAFC"/>
<animate attributeName="x1" values="0;200;0" dur="12s" repeatCount="indefinite"/>
</linearGradient>

<!-- Accent Gradient -->
<linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#2563EB"/>
<stop offset="50%" stop-color="#06B6D4"/>
<stop offset="100%" stop-color="#10B981"/>
<animate attributeName="x1" values="0;1;0" dur="8s" repeatCount="indefinite"/>
</linearGradient>

<!-- ASCII Gradient -->
<linearGradient id="asciiGradient" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#2563EB"/>
<stop offset="50%" stop-color="#06B6D4"/>
<stop offset="100%" stop-color="#10B981"/>
<animate attributeName="x1" values="0;1;0" dur="6s" repeatCount="indefinite"/>
</linearGradient>

<!-- Border Gradient -->
<linearGradient id="borderGradient">
<stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
<stop offset="50%" stop-color="#06B6D4" stop-opacity="0.8"/>
<stop offset="100%" stop-color="#10B981" stop-opacity="0.15"/>
<animate attributeName="x1" values="0;1;0" dur="5s" repeatCount="indefinite"/>
</linearGradient>

<!-- Background Glows -->
<radialGradient id="blueGlow">
<stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
</radialGradient>

<radialGradient id="cyanGlow">
<stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
</radialGradient>

<!-- Glass Blur -->
<filter id="glassBlur">
<feGaussianBlur stdDeviation="18"/>
</filter>

<!-- Glow -->
<filter id="glow">
<feGaussianBlur stdDeviation="5" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<!-- Clip -->
<clipPath id="mainClip">
<rect width="1180" height="610" rx="32"/>
</clipPath>

</defs>

<g clip-path="url(#mainClip)">

<!-- Background -->
<rect width="1180" height="610" fill="url(#bgGradient)"/>

<!-- Floating Blue Glow -->
<circle cx="150" cy="120" r="260" fill="url(#blueGlow)" filter="url(#glassBlur)">
<animateTransform attributeName="transform" type="translate" values="0 0;35 20;0 0" dur="14s" repeatCount="indefinite"/>
</circle>

<!-- Floating Cyan Glow -->
<circle cx="950" cy="470" r="280" fill="url(#cyanGlow)" filter="url(#glassBlur)">
<animateTransform attributeName="transform" type="translate" values="0 0;-30 -20;0 0" dur="16s" repeatCount="indefinite"/>
</circle>

<!-- Main Glass Container -->
<rect x="32" y="32" width="1116" height="546" rx="28" fill="#F8FAFC" fill-opacity="0.75" stroke="#0F172A" stroke-opacity="0.08" stroke-width="1"/>

<!-- Left Glass Panel -->
<rect x="55" y="70" width="390" height="470" rx="24" fill="#FFFFFF" fill-opacity="0.9" stroke="url(#borderGradient)" stroke-width="1.5">
<animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
</rect>

<!-- Right Terminal Panel -->
<rect x="470" y="70" width="655" height="470" rx="24" fill="#FFFFFF" fill-opacity="0.95" stroke="url(#borderGradient)" stroke-width="1.5">
<animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite"/>
</rect>

<!-- Glass Reflection -->
<path d="M70 90 H1080 Q1110 90 1110 120 V160 H70Z" fill="#FFFFFF" opacity="0.55">
<animate attributeName="opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite"/>
</path>

<!-- Animated Border -->
<rect x="32" y="32" width="1116" height="546" rx="28" fill="none" stroke="url(#accentGradient)" stroke-width="2" stroke-dasharray="120 800">
<animate attributeName="stroke-dashoffset" values="0;920" dur="8s" repeatCount="indefinite"/>
</rect>

<!-- Scanline Layer -->
<g opacity="0.08">
<rect x="0" y="-50" width="1180" height="3" fill="#2563EB">
<animate attributeName="y" values="-50;650" dur="5s" repeatCount="indefinite"/>
</rect>
<rect x="0" y="-200" width="1180" height="1" fill="#06B6D4">
<animate attributeName="y" values="-200;700" dur="7s" repeatCount="indefinite"/>
</rect>
</g>

<!-- Floating Particles -->
<g fill="#2563EB" filter="url(#glow)">
<circle cx="95" cy="150" r="2">
<animate attributeName="cy" values="150;120;150" dur="5s" repeatCount="indefinite"/>
</circle>
<circle cx="420" cy="430" r="1.5">
<animate attributeName="cy" values="430;390;430" dur="6s" repeatCount="indefinite"/>
</circle>
<circle cx="720" cy="110" r="2">
<animate attributeName="cy" values="110;150;110" dur="7s" repeatCount="indefinite"/>
</circle>
<circle cx="1060" cy="420" r="1.5">
<animate attributeName="cy" values="420;380;420" dur="8s" repeatCount="indefinite"/>
</circle>
</g>

<!-- Terminal Top Bar -->
<rect x="500" y="95" width="595" height="38" rx="12" fill="#E2E8F0"/>

<!-- Terminal Dots -->
<circle cx="525" cy="114" r="5" fill="#EF4444"/>
<circle cx="545" cy="114" r="5" fill="#FACC15"/>
<circle cx="565" cy="114" r="5" fill="#22C55E"/>

<!-- ASCII Portrait -->
<g transform="translate(85 145)" filter="url(#glow)">
<g>
<animateTransform attributeName="transform" type="translate" values="0 0;0 -8;0 0" dur="5s" repeatCount="indefinite"/>

<!-- ASCII Art -->
<g font-family="monospace" font-size="12" font-weight="700" fill="url(#asciiGradient)">
<text x="0" y="40">
   ████████
 ███░░░░░░███
██░░  ◉ ◉  ░░██
██░░   ▄   ░░██
██░░  ───  ░░██
 ███░░░░░░███
   ████████
</text>
<text x="0" y="180">
    ╔════════╗
    ║ AI ML  ║
    ║ GEN AI ║
    ║  NLP   ║
    ╚════════╝
</text>
<animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
</g>
</g>
</g>

<!-- ASCII Scanlines -->
<g opacity="0.12">
<rect x="70" y="150" width="330" height="2" fill="#06B6D4">
<animate attributeName="y" values="150;430" dur="4s" repeatCount="indefinite"/>
</rect>
<rect x="70" y="180" width="330" height="1" fill="#2563EB">
<animate attributeName="y" values="180;450" dur="6s" repeatCount="indefinite"/>
</rect>
</g>

<!-- ASCII Cursor -->
<rect x="350" y="410" width="10" height="18" rx="2" fill="#2563EB">
<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
</rect>

<!-- Left Side Label -->
<text x="85" y="475" fill="#475569" font-family="Inter, sans-serif" font-size="13" letter-spacing="2">
AI / ML • FULL STACK • GEN AI
</text>

<text x="85" y="505" fill="#2563EB" font-family="monospace" font-size="12">
&gt; building intelligent systems_
</text>

<!-- Terminal Content -->
<g font-family="Inter, Arial, sans-serif">

<!-- Command -->
<text x="520" y="175" fill="#64748B" font-size="15">
